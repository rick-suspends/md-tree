name: Build Standalone

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: md-tree-windows
          - os: ubuntu-22.04
            artifact: md-tree-linux
          - os: macos-latest
            artifact: md-tree-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          node node_modules/vite/bin/vite.js build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller pywebview

      - name: Build standalone
        run: pyinstaller mdtree.spec --distpath dist --workpath build --noconfirm

      - name: Zip output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/md-tree -DestinationPath ${{ matrix.artifact }}.zip

      - name: Zip output (Unix)
        if: runner.os != 'Windows'
        run: zip -r ${{ matrix.artifact }}.zip dist/md-tree

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            md-tree-windows/md-tree-windows.zip
            md-tree-linux/md-tree-linux.zip
            md-tree-macos/md-tree-macos.zip
