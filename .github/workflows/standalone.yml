name: Build Standalone

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: mdtree-windows
          - os: ubuntu-22.04
            artifact: mdtree-linux
          - os: macos-latest
            artifact: mdtree-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          node node_modules/vite/bin/vite.js build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build standalone
        run: pyinstaller mdtree.spec --distpath standalone/dist --workpath standalone/build --noconfirm

      - name: Zip output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path standalone/dist/mdtree -DestinationPath ${{ matrix.artifact }}.zip

      - name: Zip output (Unix)
        if: runner.os != 'Windows'
        run: zip -r ${{ matrix.artifact }}.zip standalone/dist/mdtree

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          retention-days: 30
